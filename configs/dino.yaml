### Prerequisite - Dino submodule

model:
  name: DinoClassifier
  params:
    model_name: DinoV2RS_Small
    pretrained: true
    num_classes: 2

dataset:
  train:
    name: ImageFolderDataset
    params:
      root: data/data_fire/Train
      transform:
        - name: Resize
          params:
            height: 224
            width: 224
        - name: HorizontalFlip
        - name: RandomBrightnessContrast
        - name: HueSaturationValue
        - name: RandomRotate90
        - name: Normalize
          params:
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]
        - name: ToTensorV2
  val:
    name: COCOClassificationDataset
    params:
      root: data/data_fire/Val
      classes: ["Fire", "Not"]
      default_class: Not
      transform:
        - name: Resize
          params:
            height: 224
            width: 224
        - name: Normalize
          params:
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]
        - name: ToTensorV2
  test:
    name: COCOClassificationDataset
    params:
      root: data/data_fire/Test
      classes: ["Fire", "Not"]
      default_class: Not
      transform:
        - name: Resize
          params:
            height: 224
            width: 224
        - name: Normalize
          params:
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]
        - name: ToTensorV2

loss:
  name: CrossEntropyLoss
  params:
    label_smoothing: 0.1

optimizer:
  name: AdamW
  params:
    lr: 1e-4
    weight_decay: 1e-3

scheduler:
  name: CosineAnnealingLR
  params:
    T_max: 10

metrics:
  - name: Accuracy
  - name: F1Score
    params:
      average: weighted

training:
  epochs: 10
  batch_size: 32
  device: mps
  save_best: true
  save_last: false
  best_filename: dino.pth
  checkpoint_dir: checkpoints
  log_dir: runs
  val_every: 1

inference:
  batch_size: 32
  device: mps