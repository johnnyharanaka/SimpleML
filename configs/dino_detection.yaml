### Prerequisite - Dino submodule


model:
  name: DinoDetector
  params:
    model_name: DinoV2RS_Small
    pretrained: true
    num_classes: 2
    proj_dim: 128
    greedy_merge_enabled: true
    greedy_iou_threshold: 0.1
    greedy_distance_threshold: 50

dataset:
  train:
    name: ImageFolderDataset
    params:
      root: data/data_fire/Train
      transform:
        - name: Resize
          params:
            height: 224
            width: 224
        - name: HorizontalFlip
        - name: RandomBrightnessContrast
        - name: HueSaturationValue
        - name: RandomRotate90
        - name: Normalize
          params:
            mean: [ 0.485, 0.456, 0.406 ]
            std: [ 0.229, 0.224, 0.225 ]
        - name: ToTensorV2
  val:
    name: COCODetectionDataset
    params:
      root: data/data_fire/Val
      classes: ["Fire", "Not"]
      default_class: Not
      transform:
        - {name: Resize, params: {height: 224, width: 224}}
        - {name: Normalize, params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}}
        - {name: ToTensorV2}
  test:
    name: COCODetectionDataset
    params:
      root: data/data_fire/Test
      classes: ["Fire", "Not"]
      default_class: Not
      transform:
        - {name: Resize, params: {height: 224, width: 224}}
        - {name: Normalize, params: {mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}}
        - {name: ToTensorV2}

loss:
  - name: CrossEntropyLoss
    params:
      label_smoothing: 0.1
  - name: SupConLoss
    params:
      temperature: 0.25

optimizer:
  name: AdamW
  params:
    lr: 1e-4
    weight_decay: 1e-3

scheduler:
  name: CosineAnnealingWarmRestarts
  params:
    T_0: 5
    T_mult: 1
    eta_min: 5.0e-07

metrics:
  - name: MeanAveragePrecision
  - name: CorLoc

training:
  seed: 42
  stage1_epochs: 5
  stage2_epochs: 10
  freeze_backbone_stage2: true
  stage1_best_metric: CorLoc
  stage2_best_metric: val_loss
  batch_size: 8
  device: mps
  save_best: true
  save_last: false
  best_filename: dino.pth
  best_metric: MeanAveragePrecision
  best_metric_mode: max
  checkpoint_dir: checkpoints
  log_dir: runs
  val_every: 1
  multi_start:
    enabled: true
    patience: 4
    min_threshold: 0.1
    trials:
      - { lr: 8.0e-06, weight_decay: 1.0e-04 }
      - { lr: 1.0e-05, weight_decay: 2.0e-04 }
      - { lr: 3.0e-05, weight_decay: 2.0e-04 }
      - { lr: 5.0e-05, weight_decay: 5.0e-04 }
      - { lr: 8.0e-05, weight_decay: 5.0e-04 }
      - { lr: 1.0e-04, weight_decay: 1.0e-03 }
      - { lr: 2.0e-04, weight_decay: 1.0e-03 }

inference:
  batch_size: 16
  device: mps
